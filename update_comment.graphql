x] `impl:` 更新路由和仓库支持授权端点 (796a5c5)\n- [x] `chore:` migration 文件 (4dd78dc)\n- [x] `refactor:` 修复 CodeRabbit 反馈的问题 (9513870)\n\n### Validation\n\n- [x] targeted tests: `go test ./internal/service/auth/...`\n- [x] contract tests: `go test ./internal/transport/http/...`\n- [x] full suite: `go test ./...`\n- [x] PR feedback sweep: 所有 CodeRabbit inline 反馈已标记 \"✅ Addressed in commit 9513870\"\n\n### Notes\n\n- PR #145: https://github.com/StephenQiu30/hotkey-server/pull/145\n- 所有 CI 检查通过（docs-hygiene SUCCESS × 2, CodeRabbit SUCCESS）\n- PR mergeable 状态: MERGEABLE\n- 无新 origin/main 提交需要合并\n- 分支与 origin/main 同步\n- CodeRabbit 剩余建议（Learnings 类 + 2 个 Optional Nitpick）为非阻塞项\n\n### Agent Review\n\n- [ ] Status: `changes requested`\n- Reviewer: `reviewer:gemini`\n- Findings:\n  - [ ] **Critical: Hardcoded AES encryption key in `internal/transport/http/router.go`.** The 32-byte key is hardcoded. It MUST be loaded from configuration.\n  - [ ] **Critical: Missing Postgres implementation for `AuthorizationRepository`.** The service currently only works with `MemoryAuthorizationRepository`. All authorizations will be lost on server restart despite the DB migration existing.\n  - [ ] **Critical: `DeleteAccount` is not transactional.** Multiple destructive operations are performed without a transaction. This can lead to inconsistent states on failure.\n  - [ ] **Major: `AuthorizationService` is not wired in `internal/app/api.go`.** It falls back to default hardcoded memory implementation.\n  - [ ] **Major: Lack of uniqueness enforcement in memory repository.** `MemoryAuthorizationRepository` allows duplicate (user, platform) pairs, which contradicts the DB schema.\n  - [ ] **Minor: Generic 500 error for unique violations in `Handler.Connect`.** Should be mapped to 409 Conflict.\n  - [ ] **Minor: Test `TestAuthorizationService_DeleteAccount` uses `account.ID` instead of access token for `CurrentUser`.**\n- Verification requested:\n  - [ ] Provide a Postgres repository implementation for authorizations.\n  - [ ] Verify `DeleteAccount` is transactional (e.g., using a new repository method or transactor).\n  - [ ] Verify AES key is loaded from config.\n  - [ ] All tests passing with Postgres repository (use build tags if needed).\n\n### Confusions\n\n- 无"
