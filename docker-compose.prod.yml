name: hotkey-prod

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hotkey-prod-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - hotkey

  redis:
    image: redis:7-alpine
    container_name: hotkey-prod-redis
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --appendonly yes --save 60 1
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - hotkey

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: hotkey-prod-minio
    restart: unless-stopped
    logging: *default-logging
    environment:
      MINIO_ROOT_USER: ${HOTKEY_MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${HOTKEY_MINIO_SECRET_KEY}
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - hotkey

  minio-init:
    image: minio/mc:RELEASE.2024-01-16T16-07-38Z
    container_name: hotkey-prod-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set hotkey http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing hotkey/$${HOTKEY_MINIO_BUCKET}
      "
    environment:
      MINIO_ROOT_USER: ${HOTKEY_MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${HOTKEY_MINIO_SECRET_KEY}
      HOTKEY_MINIO_BUCKET: ${HOTKEY_MINIO_BUCKET:-hotkey-snapshots}
    networks:
      - hotkey

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotkey-prod-server
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${WEB_PUBLISHED_PORT:-8080}:8080"
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      HOTKEY_HTTP_ADDR: ":8080"
      HOTKEY_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      HOTKEY_REDIS_URL: redis://redis:6379/${REDIS_DB:-0}
      HOTKEY_MINIO_ENDPOINT: minio:9000
      HOTKEY_MINIO_USE_SSL: "false"
      LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - hotkey

  web:
    build:
      context: ../hotkey-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_HOTKEY_API_BASE_URL: ${PUBLIC_API_URL:-http://127.0.0.1:8080}
    container_name: hotkey-prod-web
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${WEB_FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
    depends_on:
      server:
        condition: service_healthy
    networks:
      - hotkey

  n8n:
    image: n8nio/n8n:1.76.1
    container_name: hotkey-prod-n8n
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${N8N_PUBLISHED_PORT:-5678}:5678"
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      GENERIC_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: "5678"
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      HOTKEY_INTERNAL_API_KEY: ${HOTKEY_INTERNAL_API_KEY}
      HOTKEY_DEFAULT_TENANT_ID: ${HOTKEY_DEFAULT_TENANT_ID:-tenant-default}
      DASHSCOPE_API_KEY: ${HOTKEY_DASHSCOPE_API_KEY}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      DASHSCOPE_CHAT_MODEL: ${DASHSCOPE_CHAT_MODEL:-qwen-plus}
      DASHSCOPE_EMBEDDING_MODEL: ${DASHSCOPE_EMBEDDING_MODEL:-text-embedding-v2}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      server:
        condition: service_healthy
    networks:
      - hotkey

networks:
  hotkey:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  n8n_data:
