services:
  api:
    env_file:
      - path: ./.env.example
        required: true
      - path: ./.env.production
        required: false
    environment:
      APP_ENV: production

  web:
    env_file:
      - path: ./.env.example
        required: true
      - path: ./.env.production
        required: false
    environment:
      APP_ENV: production
      NEXT_PUBLIC_API_BASE_URL: /

  nginx:
    ports:
      - "80:80"
