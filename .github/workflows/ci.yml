name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Job 1 — 编译与静态检查
  build:
    name: Build & vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Go build
        run: go build ./...

      - name: Go vet
        run: go vet ./...

  # Job 2 — 测试
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Go test
        run: go test ./... -v -count=1

  # Job 3 — 架构与运行校验
  validate:
    name: Architecture & smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Create .env from example
        run: cp .env.example .env

      - name: Architecture boundary validation
        run: bash scripts/validate-architecture-boundaries.sh

      - name: Schema validation
        run: bash scripts/validate-schema.sh

      - name: Runtime API smoke
        run: bash scripts/smoke-api.sh
