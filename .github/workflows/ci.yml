name: ci

on:
  push:
  pull_request:

jobs:
  docs-hygiene:
    name: docs-hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check markdown whitespace
        run: git diff --check

      - name: Check PRD and plan numbering
        run: python3 -m unittest tests.test_workflow_contract

      - name: Check old runtime is absent
        run: |
          test ! -d server
          test ! -d scripts
          test ! -d sql
          test ! -d packages
          test ! -d deploy
          test ! -d openspec/changes
          test ! -d openspec/specs
          test ! -f package.json
          test ! -f pyproject.toml
          test ! -f Dockerfile.api
          test ! -f docker-compose.yml
          test ! -f docker-compose.prod.yml

      - name: Run Go tests
        run: go test ./...
