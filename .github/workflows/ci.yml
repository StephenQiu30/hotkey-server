name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Job 1 — 编译与静态检查
  build:
    name: Build & vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Go build
        run: go build ./...

      - name: Go vet
        run: go vet ./...

  # Job 2 — 测试
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Go test
        run: go test ./... -v -count=1

  # Job 3 — 架构与运行校验
  validate:
    name: Architecture & smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: dummy
          POSTGRES_PASSWORD: dummy
          POSTGRES_DB: hotkey
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Create .env from example
        run: cp .env.example .env

      - name: Apply database schema
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          PGPASSWORD=dummy psql -h localhost -U dummy -d hotkey -f db/schema.sql
        env:
          PGPASSWORD: dummy

      - name: Architecture boundary validation
        run: bash scripts/validate-architecture-boundaries.sh

      - name: Schema validation
        run: bash scripts/validate-schema.sh

      - name: Runtime API smoke
        run: bash scripts/smoke-api.sh
        env:
          DATABASE_URL: postgres://dummy:dummy@localhost:5432/hotkey?sslmode=disable
