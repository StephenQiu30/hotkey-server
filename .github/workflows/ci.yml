name: Test acceptance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance:
    name: Server test acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: hotkey_test
          POSTGRES_USER: hotkey
          POSTGRES_PASSWORD: hotkey
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hotkey -d hotkey_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      HOTKEY_TEST_DSN: postgres://hotkey:hotkey@localhost:5432/hotkey_test?sslmode=disable
      HOTKEY_TEST_REDIS_URL: redis://127.0.0.1:6379/15

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: OpenAPI contract acceptance
        run: make openapi-check

      - name: Static analysis acceptance
        run: make lint

      - name: Database runtime acceptance
        run: make database-runtime-verify

      - name: Unit and integration test acceptance
        run: make test

      - name: Build acceptance
        run: make build

      - name: Architecture and repository acceptance
        run: make validate

      - name: Schema acceptance
        run: make schema-verify

      - name: Clean generated artifacts
        if: always()
        run: make clean
