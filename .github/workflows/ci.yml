name: ci

on:
  push:
  pull_request:

jobs:
  docs-hygiene:
    name: docs-hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check markdown whitespace
        run: git diff --check

      - name: Check PRD and plan numbering
        shell: bash
        run: |
          prd_numbers="$(find docs/product/prd -maxdepth 1 -type f -name '*.md' -printf '%f\n' | sed -n 's/^\([0-9]\+\)-.*/\1/p' | sort -n | tr '\n' ' ')"
          plan_numbers="$(find docs/plans -maxdepth 1 -type f -name '*.md' -printf '%f\n' | sed -n 's/^\([0-9]\+\)-.*/\1/p' | sort -n | tr '\n' ' ')"
          expected="$(seq 1 22 | tr '\n' ' ')"
          test "$prd_numbers" = "$expected"
          test "$plan_numbers" = "$expected"

      - name: Check old runtime is absent
        run: |
          test ! -d server
          test ! -d tests
          test ! -d scripts
          test ! -d sql
          test ! -d packages
          test ! -d deploy
          test ! -d openspec/changes
          test ! -d openspec/specs
          test ! -f .env.example
          test ! -f package.json
          test ! -f pyproject.toml
          test ! -f Dockerfile.api
          test ! -f docker-compose.yml
          test ! -f docker-compose.prod.yml
