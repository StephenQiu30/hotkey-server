name: 功能建议
description: 提议新的使用场景、能力或改进方向
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 用户问题
      description: 请先描述谁在什么场景遇到了什么问题。
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: 期望结果
      description: 成功后用户可以完成什么？如何判断有效？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 可选。说明 API、数据模型、来源、交付或运维方面的想法。
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
  - type: dropdown
    id: area
    attributes:
      label: 主要领域
      options:
        - 来源与采集
        - 内容与证据
        - 相关性与事件智能
        - AI Provider
        - 知识与报告
        - 身份与权限
        - 运维与可观测性
        - 文档与开发体验
        - 其他
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现相同建议。
          required: true
        - label: 如果涉及新来源，我可以说明其官方或授权访问方式。
          required: false
