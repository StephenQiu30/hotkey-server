name: Bug 报告
description: 提交可复现的错误、回归或异常行为
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。安全漏洞请使用仓库 Security 页面私密报告，不要填写此表单。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 实际发生了什么？这对你的使用造成了什么影响？
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 使用配置……
        2. 执行命令……
        3. 观察到……
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本或提交
      placeholder: commit SHA / release version
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 运行环境
      description: 操作系统、Go/PostgreSQL/Redis/MinIO 版本、运行角色和相关非敏感配置。
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志或补充信息
      description: 请先移除密钥、Token、邮箱、内容正文、对象键和数据库信息。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现重复问题。
          required: true
        - label: 这不是需要私密报告的安全漏洞。
          required: true
