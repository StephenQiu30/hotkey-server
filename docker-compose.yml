services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    working_dir: /workspace
    env_file:
      - path: ./.env.example
      - path: ./.env
        required: false
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://root:your-password@host.docker.internal:5432/ai_hotspot_radar}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

