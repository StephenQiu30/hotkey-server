services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hotkey}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotkey}
      POSTGRES_DB: ${POSTGRES_DB:-hotkey}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotkey}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: ["./hotkey-server", "api"]
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hotkey}:${POSTGRES_PASSWORD:-hotkey}@postgres:5432/${POSTGRES_DB:-hotkey}?sslmode=disable
      REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: .
    command: ["./hotkey-server", "worker"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hotkey}:${POSTGRES_PASSWORD:-hotkey}@postgres:5432/${POSTGRES_DB:-hotkey}?sslmode=disable
      REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
