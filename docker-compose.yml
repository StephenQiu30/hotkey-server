# HotKey 本地开发编排
#
# PostgreSQL / Redis / MinIO 在本机启动（brew services 等），compose 只跑应用容器，
# 并通过 host.docker.internal 连接宿主机服务。
#
# 线上 / 自托管全栈部署请使用 docker-compose.prod.yml。
#
# 用法：
#   cp .env.example .env
#   docker compose up -d --build

name: hotkey

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotkey-server
    restart: unless-stopped
    ports:
      - "${WEB_PUBLISHED_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      HOTKEY_HTTP_ADDR: ":8080"
      # 容器内通过 host.docker.internal 访问宿主机上的 PostgreSQL / Redis / MinIO
      HOTKEY_DATABASE_URL: postgres://${POSTGRES_USER:-hotkey}:${POSTGRES_PASSWORD:-hotkey}@host.docker.internal:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-hotkey}?sslmode=disable
      HOTKEY_REDIS_URL: redis://host.docker.internal:${REDIS_PORT:-6379}/${REDIS_DB:-0}
      HOTKEY_MINIO_ENDPOINT: host.docker.internal:${MINIO_PORT:-9000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ../hotkey-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_HOTKEY_API_BASE_URL: http://127.0.0.1:${WEB_PUBLISHED_PORT:-8080}
    container_name: hotkey-web
    restart: unless-stopped
    ports:
      - "${WEB_FRONTEND_PORT:-3000}:3000"
    depends_on:
      server:
        condition: service_healthy
