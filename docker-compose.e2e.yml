# E2E test infrastructure for HotKey server.
# Usage: make e2e-up / make e2e-down / make e2e-test

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hotkey-e2e-postgres
    environment:
      POSTGRES_USER: hotkey
      POSTGRES_PASSWORD: hotkey_e2e
      POSTGRES_DB: hotkey_e2e
    ports:
      - "15432:5432"
    volumes:
      - ./internal/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./tests/fixtures/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotkey -d hotkey_e2e"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hotkey-e2e-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: hotkey-e2e-minio
    environment:
      MINIO_ROOT_USER: hotkey_e2e
      MINIO_ROOT_PASSWORD: hotkey_e2e_pass
    ports:
      - "19000:9000"
      - "19001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
