openapi: 3.1.0
info:
  title: HotKey Server API
  version: 0.2.0
paths:
  /healthz:
    get:
      responses:
        "200":
          description: Health check.
  /api/v1/auth/register:
    post:
      summary: Register with email and password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "201":
          description: User created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "409":
          description: Duplicate email.
          content:
            application/json:
              examples:
                duplicate:
                  value:
                    error:
                      code: email_already_exists
                      message: email already exists
  /api/v1/auth/login:
    post:
      summary: Login with email and password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: Access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          description: Uniform credential failure.
          content:
            application/json:
              examples:
                invalid:
                  value:
                    error:
                      code: invalid_credentials
                      message: invalid credentials
  /api/v1/auth/refresh:
    post:
      summary: Exchange refresh token for a new access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          description: Refresh token is invalid, revoked, or expired.
  /api/v1/auth/logout:
    post:
      summary: Revoke a refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: Refresh token revoked.
  /api/v1/me:
    get:
      summary: Current user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Missing or invalid access token.
  /api/v1/channels:
    get:
      summary: List active channels.
      responses:
        "200":
          description: Active system channels.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelListResponse"
  /api/v1/me/channels:
    get:
      summary: List current user's channel subscriptions.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User channel subscriptions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionListResponse"
        "401":
          description: Missing or invalid access token.
  /api/v1/me/channels/{channelID}:
    post:
      summary: Subscribe current user to a channel.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChannelID"
      responses:
        "201":
          description: Subscription created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
        "409":
          description: Channel is disabled.
          content:
            application/json:
              examples:
                disabled:
                  value:
                    error:
                      code: channel_disabled
                      message: channel disabled
    delete:
      summary: Unsubscribe current user from a channel.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChannelID"
      responses:
        "204":
          description: Subscription removed.
  /api/v1/me/keywords:
    get:
      summary: List current user's keywords.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User keywords.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordListResponse"
    post:
      summary: Create a keyword for current user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeywordRequest"
      responses:
        "201":
          description: Keyword created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordResponse"
  /api/v1/me/keywords/{keywordID}:
    patch:
      summary: Update current user's keyword.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/KeywordID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeywordRequest"
      responses:
        "200":
          description: Keyword updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordResponse"
    delete:
      summary: Delete current user's keyword.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/KeywordID"
      responses:
        "204":
          description: Keyword deleted.
  /api/v1/me/preferences/daily-send-at:
    put:
      summary: Set current user's daily Chinese digest send time.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailySendAtRequest"
      responses:
        "200":
          description: User preference updated.
  /api/v1/admin/channels:
    get:
      summary: List channels for admins.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Channels.
    post:
      summary: Create a channel.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChannelRequest"
      responses:
        "201":
          description: Channel created.
        "409":
          description: Channel slug already exists.
          content:
            application/json:
              examples:
                duplicate:
                  value:
                    error:
                      code: channel_slug_already_exists
                      message: channel slug already exists
  /api/v1/admin/channels/{channelID}:
    patch:
      summary: Update a channel or set channel status.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChannelID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChannelRequest"
      responses:
        "200":
          description: Channel updated.
    delete:
      summary: Delete a channel.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChannelID"
      responses:
        "204":
          description: Channel deleted.
  /api/v1/admin/settings/default-daily-send-at:
    put:
      summary: Set global default daily digest send time.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailySendAtRequest"
      responses:
        "200":
          description: Default send time updated.
  /api/v1/admin/sources:
    get:
      summary: List sources for admins.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sources.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceListResponse"
        "403":
          description: User role cannot access source management.
    post:
      summary: Create a source.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceRequest"
      responses:
        "201":
          description: Source created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
        "400":
          description: Source validation failed.
          content:
            application/json:
              examples:
                compliance:
                  value:
                    error:
                      code: compliance_note_required
                      message: compliance note required
  /api/v1/admin/sources/{sourceID}:
    patch:
      summary: Update source metadata, strategy, and channel bindings.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceRequest"
      responses:
        "200":
          description: Source updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
  /api/v1/admin/sources/{sourceID}/status:
    patch:
      summary: Enable or disable a source.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceStatusRequest"
      responses:
        "200":
          description: Source status updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
  /api/v1/admin/sources/{sourceID}/collection-runs:
    get:
      summary: List collection runs for a source.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SourceID"
      responses:
        "200":
          description: Collection runs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionRunListResponse"
  /api/v1/admin/sources/{sourceID}/test-fetch:
    post:
      summary: Test source collection boundary without content normalization.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SourceID"
      responses:
        "200":
          description: Test fetch succeeded and recorded a collection run.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionRunResponse"
        "502":
          description: Test fetch failed and recorded a collection run.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionRunResponse"
components:
  parameters:
    ChannelID:
      name: channelID
      in: path
      required: true
      schema:
        type: string
    KeywordID:
      name: keywordID
      in: path
      required: true
      schema:
        type: string
    SourceID:
      name: sourceID
      in: path
      required: true
      schema:
        type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    AuthRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    Session:
      type: object
      required:
        - accessToken
        - refreshToken
        - expiresAt
        - user
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"
    UserResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      required:
        - id
        - email
        - role
        - status
        - timezone
        - dailySendAt
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - user
            - admin
        status:
          type: string
          enum:
            - active
            - disabled
        timezone:
          type: string
        dailySendAt:
          type: string
    Channel:
      type: object
      required:
        - id
        - name
        - slug
        - status
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - active
            - disabled
    ChannelRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - active
            - disabled
    ChannelListResponse:
      type: object
      properties:
        channels:
          type: array
          items:
            $ref: "#/components/schemas/Channel"
    Subscription:
      type: object
      properties:
        userId:
          type: string
        channel:
          $ref: "#/components/schemas/Channel"
    SubscriptionResponse:
      type: object
      properties:
        subscription:
          $ref: "#/components/schemas/Subscription"
    SubscriptionListResponse:
      type: object
      properties:
        subscriptions:
          type: array
          items:
            $ref: "#/components/schemas/Subscription"
    Keyword:
      type: object
      properties:
        id:
          type: string
        keyword:
          type: string
        enabled:
          type: boolean
    KeywordRequest:
      type: object
      properties:
        keyword:
          type: string
        enabled:
          type: boolean
    KeywordResponse:
      type: object
      properties:
        keyword:
          $ref: "#/components/schemas/Keyword"
    KeywordListResponse:
      type: object
      properties:
        keywords:
          type: array
          items:
            $ref: "#/components/schemas/Keyword"
    DailySendAtRequest:
      type: object
      required:
        - dailySendAt
      properties:
        dailySendAt:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    Source:
      type: object
      required:
        - id
        - name
        - type
        - url
        - status
        - fetchIntervalMin
        - channelIDs
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum:
            - rss
            - public_page
        url:
          type: string
          format: uri
        status:
          type: string
          enum:
            - enabled
            - disabled
        complianceNote:
          type: string
        fetchIntervalMin:
          type: integer
          minimum: 1
        rateLimitPerHour:
          type: integer
          minimum: 0
        channelIDs:
          type: array
          items:
            type: string
        lastError:
          type: string
        lastCollectedAt:
          type: string
          format: date-time
    SourceRequest:
      type: object
      required:
        - name
        - type
        - url
        - fetchIntervalMin
      properties:
        name:
          type: string
        type:
          type: string
          enum:
            - rss
            - public_page
        url:
          type: string
          format: uri
        complianceNote:
          type: string
          description: Required for public_page sources.
        fetchIntervalMin:
          type: integer
          minimum: 1
        rateLimitPerHour:
          type: integer
          minimum: 0
        channelIDs:
          type: array
          items:
            type: string
    SourceStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - enabled
            - disabled
    SourceResponse:
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
    SourceListResponse:
      type: object
      properties:
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Source"
    CollectionRun:
      type: object
      properties:
        id:
          type: string
        sourceID:
          type: string
        status:
          type: string
          enum:
            - success
            - failed
        itemsFetched:
          type: integer
        error:
          type: string
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
    CollectionRunListResponse:
      type: object
      properties:
        collectionRuns:
          type: array
          items:
            $ref: "#/components/schemas/CollectionRun"
    CollectionRunResponse:
      type: object
      properties:
        collectionRun:
          $ref: "#/components/schemas/CollectionRun"
