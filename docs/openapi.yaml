openapi: 3.1.0
info:
  title: HotKey Server API
  version: 0.2.0
paths:
  /healthz:
    get:
      responses:
        "200":
          description: Health check.
  /api/v1/auth/register:
    post:
      summary: Register with email and password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "201":
          description: User created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "409":
          description: Duplicate email.
          content:
            application/json:
              examples:
                duplicate:
                  value:
                    error:
                      code: email_already_exists
                      message: email already exists
  /api/v1/auth/login:
    post:
      summary: Login with email and password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: Access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          description: Uniform credential failure.
          content:
            application/json:
              examples:
                invalid:
                  value:
                    error:
                      code: invalid_credentials
                      message: invalid credentials
  /api/v1/auth/refresh:
    post:
      summary: Exchange refresh token for a new access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          description: Refresh token is invalid, revoked, or expired.
  /api/v1/auth/logout:
    post:
      summary: Revoke a refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: Refresh token revoked.
  /api/v1/me:
    get:
      summary: Current user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Missing or invalid access token.
    delete:
      summary: Delete current user account and all associated data.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Account deleted.
        "401":
          description: Missing or invalid access token.
  /api/v1/authorizations:
    get:
      summary: List current user's platform authorizations.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User authorizations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationListResponse"
        "401":
          description: Missing or invalid access token.
  /api/v1/authorizations/connect:
    post:
      summary: Connect a new platform authorization.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectRequest"
      responses:
        "201":
          description: Authorization created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationResponse"
        "400":
          description: Invalid platform.
        "401":
          description: Missing or invalid access token.
        "409":
          description: Platform already connected for this user.
  /api/v1/authorizations/{authorizationID}:
    delete:
      summary: Disconnect and revoke a platform authorization.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AuthorizationID"
      responses:
        "204":
          description: Authorization revoked.
        "401":
          description: Missing or invalid access token.
        "404":
          description: Authorization not found.
        "409":
          description: Authorization already revoked.
  /api/v1/authorizations/{authorizationID}/test:
    post:
      summary: Test authorization health and update status.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AuthorizationID"
      responses:
        "200":
          description: Health check result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationResponse"
        "401":
          description: Missing or invalid access token.
        "404":
          description: Authorization not found.
  /api/v1/channels:
    get:
      summary: List active channels.
      responses:
        "200":
          description: Active system channels.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelListResponse"
  /api/v1/me/channels:
    get:
      summary: List current user's channel subscriptions.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User channel subscriptions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionListResponse"
        "401":
          description: Missing or invalid access token.
  /api/v1/me/channels/{channelID}:
    post:
      summary: Subscribe current user to a channel.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChannelID"
      responses:
        "201":
          description: Subscription created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
        "409":
          description: Channel is disabled.
          content:
            application/json:
              examples:
                disabled:
                  value:
                    error:
                      code: channel_disabled
                      message: channel disabled
    delete:
      summary: Unsubscribe current user from a channel.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChannelID"
      responses:
        "204":
          description: Subscription removed.
  /api/v1/me/keywords:
    get:
      summary: List current user's keywords.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User keywords.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordListResponse"
    post:
      summary: Create a keyword for current user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeywordRequest"
      responses:
        "201":
          description: Keyword created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordResponse"
  /api/v1/me/keywords/{keywordID}:
    patch:
      summary: Update current user's keyword.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/KeywordID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeywordRequest"
      responses:
        "200":
          description: Keyword updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordResponse"
    delete:
      summary: Delete current user's keyword.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/KeywordID"
      responses:
        "204":
          description: Keyword deleted.
  /api/v1/me/preferences/daily-send-at:
    put:
      summary: Set current user's daily Chinese digest send time.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailySendAtRequest"
      responses:
        "200":
          description: User preference updated.
  /api/v1/admin/channels:
    get:
      summary: List channels for admins.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Channels.
    post:
      summary: Create a channel.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChannelRequest"
      responses:
        "201":
          description: Channel created.
        "409":
          description: Channel slug already exists.
          content:
            application/json:
              examples:
                duplicate:
                  value:
                    error:
                      code: channel_slug_already_exists
                      message: channel slug already exists
  /api/v1/admin/channels/{channelID}:
    patch:
      summary: Update a channel or set channel status.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChannelID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChannelRequest"
      responses:
        "200":
          description: Channel updated.
    delete:
      summary: Delete a channel.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChannelID"
      responses:
        "204":
          description: Channel deleted.
  /api/v1/admin/settings/default-daily-send-at:
    put:
      summary: Set global default daily digest send time.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailySendAtRequest"
      responses:
        "200":
          description: Default send time updated.
  /api/v1/admin/sources:
    get:
      summary: List sources for admins.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sources.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceListResponse"
        "403":
          description: User role cannot access source management.
    post:
      summary: Create a source.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceRequest"
      responses:
        "201":
          description: Source created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
        "400":
          description: Source validation failed.
          content:
            application/json:
              examples:
                compliance:
                  value:
                    error:
                      code: compliance_note_required
                      message: compliance note required
  /api/v1/admin/sources/{sourceID}:
    patch:
      summary: Update source metadata, strategy, and channel bindings.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceRequest"
      responses:
        "200":
          description: Source updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
  /api/v1/admin/sources/{sourceID}/status:
    patch:
      summary: Enable or disable a source.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceStatusRequest"
      responses:
        "200":
          description: Source status updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
  /api/v1/admin/sources/{sourceID}/collection-runs:
    get:
      summary: List collection runs for a source.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SourceID"
      responses:
        "200":
          description: Collection runs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionRunListResponse"
  /api/v1/admin/sources/{sourceID}/test-fetch:
    post:
      summary: Test source collection boundary without content normalization.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SourceID"
      responses:
        "200":
          description: Test fetch succeeded and recorded a collection run.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionRunResponse"
        "502":
          description: Test fetch failed and recorded a collection run.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionRunResponse"
  /api/v1/admin/config/status:
    get:
      summary: Inspect PostgreSQL, Redis, DashScope, and SMTP configuration status.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Config status. Unavailable or missing dependencies return degraded rather than panic.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigStatusResponse"
        "403":
          description: User role cannot access admin config status.
  /api/v1/admin/audit-logs:
    get:
      summary: List recent admin write audit logs.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Audit logs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"
        "403":
          description: User role cannot access admin audit logs.
  /api/v1/admin/jobs:
    get:
      summary: Queue overview by status.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Queue overview.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueOverviewResponse"
        "403":
          description: User role cannot access admin job overview.
  /api/v1/admin/jobs/failed:
    get:
      summary: List failed and dead-letter jobs.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Failed jobs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
        "403":
          description: User role cannot access admin failed jobs.
  /api/v1/admin/jobs/{jobID}:
    get:
      summary: Read job detail.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/JobID"
      responses:
        "200":
          description: Job detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "404":
          description: Job not found.
        "403":
          description: User role cannot access admin job detail.
  /api/v1/admin/jobs/{jobID}/retry:
    post:
      summary: Retry a failed or dead-letter job.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/JobID"
      responses:
        "202":
          description: Job reset to pending for retry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "403":
          description: User role cannot retry admin jobs.
  /api/v1/admin/daily-reports/rerun:
    post:
      summary: Enqueue a daily report rerun for a date with optional channel and user scope.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyReportRerunRequest"
      responses:
        "202":
          description: Rerun job accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "403":
          description: User role cannot rerun daily reports.
  /api/v1/hotspots:
    get:
      summary: List hotspot scores sorted by total_score descending.
      security:
        - bearerAuth: []
      parameters:
        - name: channel
          in: query
          required: false
          schema:
            type: string
          description: Filter by channel slug.
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Start of time window (ISO 8601).
        - name: until
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: End of time window (ISO 8601).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Maximum number of results.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of results to skip.
      responses:
        "200":
          description: Hotspot scores sorted by total_score descending.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotspotList"
        "401":
          description: Missing or invalid access token.
  /api/v1/hotspots/{hotspotID}:
    get:
      summary: Get hotspot detail by cluster ID.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/HotspotID"
      responses:
        "200":
          description: Hotspot detail with score explanation and source refs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotspotDetail"
        "401":
          description: Missing or invalid access token.
        "404":
          description: Hotspot not found.
          content:
            application/json:
              examples:
                not_found:
                  value:
                    error:
                      code: hotspot_not_found
                      message: hotspot not found
  /api/v1/reports:
    get:
      summary: List daily reports by date.
      security:
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Daily reports for the requested date.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReportList"
        "400":
          description: Invalid date.
        "401":
          description: Missing or invalid access token.
  /api/v1/reports/{reportID}:
    get:
      summary: Get one daily report.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReportID"
      responses:
        "200":
          description: Daily report with source references.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReport"
        "401":
          description: Missing or invalid access token.
        "404":
          description: Report not found.
  /rss/channels/{channelCode}.xml:
    get:
      summary: Public channel RSS feed.
      parameters:
        - $ref: "#/components/parameters/ChannelCode"
      responses:
        "200":
          description: RSS 2.0 XML built from generated channel daily reports.
          content:
            application/rss+xml:
              schema:
                type: string
        "400":
          description: Invalid channel code.
  /rss/users/{token}.xml:
    get:
      summary: Private user RSS feed by opaque token.
      parameters:
        - $ref: "#/components/parameters/RSSToken"
      responses:
        "200":
          description: RSS 2.0 XML built from generated user daily reports.
          content:
            application/rss+xml:
              schema:
                type: string
        "404":
          description: Token is missing, invalid, reset, or disabled.
  /api/v1/me/rss:
    get:
      summary: Get current user's RSS feed status.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user's private RSS status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RSSFeed"
        "401":
          description: Missing or invalid access token.
    delete:
      summary: Disable current user's private RSS feed.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: RSS feed disabled.
        "401":
          description: Missing or invalid access token.
  /api/v1/admin/adapters:
    get:
      summary: List all registered platform adapters with health and capabilities.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Registered adapters.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdapterInfo"
        "401":
          description: Missing or invalid access token.
        "403":
          description: User role cannot access adapter management.
  /api/v1/admin/adapters/{provider}/health:
    get:
      summary: Get health status of a specific adapter.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Provider"
      responses:
        "200":
          description: Adapter health status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdapterHealth"
        "401":
          description: Missing or invalid access token.
        "403":
          description: User role cannot access adapter management.
        "404":
          description: Adapter not found for provider.
          content:
            application/json:
              examples:
                not_found:
                  value:
                    error:
                      code: adapter_not_found
                      message: "no adapter registered for provider: official_api"
  /api/v1/admin/adapters/{provider}/capabilities:
    get:
      summary: Get capabilities of a specific adapter.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Provider"
      responses:
        "200":
          description: Adapter capabilities.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdapterCapabilities"
        "401":
          description: Missing or invalid access token.
        "403":
          description: User role cannot access adapter management.
        "404":
          description: Adapter not found for provider.
          content:
            application/json:
              examples:
                not_found:
                  value:
                    error:
                      code: adapter_not_found
                      message: "no adapter registered for provider: official_api"
  /api/v1/me/rss/reset:
    post:
      summary: Create or rotate current user's private RSS token.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: New private RSS token. The plaintext token is returned once and only its hash is stored.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RSSFeedWithToken"
        "401":
          description: Missing or invalid access token.
  /api/v1/me/obsidian/connect:
    post:
      summary: Connect Obsidian Git repository for sync.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObsidianConnectRequest"
      responses:
        "200":
          description: Repository connected successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObsidianConnectResponse"
        "400":
          description: Invalid input or branch/directory not found.
        "401":
          description: Missing or invalid access token.
        "403":
          description: Git authentication failed.
  /api/v1/me/obsidian:
    get:
      summary: Get current Obsidian sync status.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current sync configuration and status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObsidianStatusResponse"
        "401":
          description: Missing or invalid access token.
        "404":
          description: Obsidian sync not connected.
    delete:
      summary: Disconnect Obsidian Git sync.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Disconnected successfully.
        "401":
          description: Missing or invalid access token.
        "404":
          description: Obsidian sync not connected.
  /api/v1/me/obsidian/sync:
    post:
      summary: Sync content to Obsidian Git repository.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObsidianSyncRequest"
      responses:
        "200":
          description: Sync result (may be idempotent, conflicted, or failed).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObsidianSyncResponse"
        "400":
          description: Invalid input.
        "401":
          description: Missing or invalid access token.
        "404":
          description: Obsidian sync not connected.
        "409":
          description: File conflict detected.
components:
  parameters:
    ChannelCode:
      name: channelCode
      in: path
      required: true
      schema:
        type: string
    RSSToken:
      name: token
      in: path
      required: true
      schema:
        type: string
    ChannelID:
      name: channelID
      in: path
      required: true
      schema:
        type: string
    KeywordID:
      name: keywordID
      in: path
      required: true
      schema:
        type: string
    SourceID:
      name: sourceID
      in: path
      required: true
      schema:
        type: string
    HotspotID:
      name: hotspotID
      in: path
      required: true
      schema:
        type: string
    JobID:
      name: jobID
      in: path
      required: true
      schema:
        type: string
    ReportID:
      name: reportID
      in: path
      required: true
      schema:
        type: string
    AuthorizationID:
      name: authorizationID
      in: path
      required: true
      schema:
        type: string
    Provider:
      name: provider
      in: path
      required: true
      schema:
        type: string
        enum:
          - rss
          - public_page
          - official_api
      description: Platform provider identifier.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    Authorization:
      type: object
      required:
        - id
        - platform
        - platformUserId
        - displayName
        - status
        - connectedAt
        - lastCheckedAt
      properties:
        id:
          type: string
        platform:
          type: string
          enum:
            - github
            - wechat
            - rss
            - custom
        platformUserId:
          type: string
        displayName:
          type: string
        status:
          type: string
          enum:
            - connected
            - expired
            - revoked
        connectedAt:
          type: string
          format: date-time
        lastCheckedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
    AuthorizationResponse:
      type: object
      required:
        - authorization
      properties:
        authorization:
          $ref: "#/components/schemas/Authorization"
    AuthorizationListResponse:
      type: object
      required:
        - authorizations
      properties:
        authorizations:
          type: array
          items:
            $ref: "#/components/schemas/Authorization"
    ConnectRequest:
      type: object
      required:
        - platform
        - accessToken
      properties:
        platform:
          type: string
          enum:
            - github
            - wechat
            - rss
            - custom
        platformUserId:
          type: string
        displayName:
          type: string
        accessToken:
          type: string
        refreshToken:
          type: string
    AuthRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    Session:
      type: object
      required:
        - accessToken
        - refreshToken
        - expiresAt
        - user
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"
    UserResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      required:
        - id
        - email
        - role
        - status
        - timezone
        - dailySendAt
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - user
            - admin
        status:
          type: string
          enum:
            - active
            - disabled
        timezone:
          type: string
        dailySendAt:
          type: string
    Channel:
      type: object
      required:
        - id
        - name
        - slug
        - status
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - active
            - disabled
    ChannelRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - active
            - disabled
    ChannelListResponse:
      type: object
      properties:
        channels:
          type: array
          items:
            $ref: "#/components/schemas/Channel"
    Subscription:
      type: object
      properties:
        userId:
          type: string
        channel:
          $ref: "#/components/schemas/Channel"
    SubscriptionResponse:
      type: object
      properties:
        subscription:
          $ref: "#/components/schemas/Subscription"
    SubscriptionListResponse:
      type: object
      properties:
        subscriptions:
          type: array
          items:
            $ref: "#/components/schemas/Subscription"
    Keyword:
      type: object
      properties:
        id:
          type: string
        keyword:
          type: string
        enabled:
          type: boolean
    KeywordRequest:
      type: object
      properties:
        keyword:
          type: string
        enabled:
          type: boolean
    KeywordResponse:
      type: object
      properties:
        keyword:
          $ref: "#/components/schemas/Keyword"
    KeywordListResponse:
      type: object
      properties:
        keywords:
          type: array
          items:
            $ref: "#/components/schemas/Keyword"
    DailySendAtRequest:
      type: object
      required:
        - dailySendAt
      properties:
        dailySendAt:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    HotspotScore:
      type: object
      required:
        - id
        - clusterId
        - totalScore
        - sourceCountScore
        - freshnessScore
        - relevanceScore
        - propagationScore
        - qualityScore
        - explanation
        - scoreVersion
        - channelIDs
        - sourceRefs
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        clusterId:
          type: string
        totalScore:
          type: number
          format: double
        sourceCountScore:
          type: number
          format: double
        freshnessScore:
          type: number
          format: double
        relevanceScore:
          type: number
          format: double
        propagationScore:
          type: number
          format: double
        qualityScore:
          type: number
          format: double
        explanation:
          type: string
          description: JSON string containing scoring dimension details.
        scoreVersion:
          type: string
        channelIDs:
          type: array
          items:
            type: string
        sourceRefs:
          type: array
          items:
            $ref: "#/components/schemas/HotspotSourceRef"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    HotspotDetail:
      $ref: "#/components/schemas/HotspotScore"
    HotspotSourceRef:
      type: object
      required:
        - itemId
        - sourceId
      properties:
        itemId:
          type: string
        sourceId:
          type: string
        title:
          type: string
        url:
          type: string
          format: uri
    HotspotList:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/HotspotScore"
    Source:
      type: object
      required:
        - id
        - name
        - type
        - url
        - status
        - fetchIntervalMin
        - channelIDs
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum:
            - rss
            - public_page
        url:
          type: string
          format: uri
        status:
          type: string
          enum:
            - enabled
            - disabled
        complianceNote:
          type: string
        fetchIntervalMin:
          type: integer
          minimum: 1
        rateLimitPerHour:
          type: integer
          minimum: 0
        channelIDs:
          type: array
          items:
            type: string
        lastError:
          type: string
        lastCollectedAt:
          type: string
          format: date-time
    SourceRequest:
      type: object
      required:
        - name
        - type
        - url
        - fetchIntervalMin
      properties:
        name:
          type: string
        type:
          type: string
          enum:
            - rss
            - public_page
        url:
          type: string
          format: uri
        complianceNote:
          type: string
          description: Required for public_page sources.
        fetchIntervalMin:
          type: integer
          minimum: 1
        rateLimitPerHour:
          type: integer
          minimum: 0
        channelIDs:
          type: array
          items:
            type: string
    SourceStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - enabled
            - disabled
    SourceResponse:
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
    SourceListResponse:
      type: object
      properties:
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Source"
    CollectionRun:
      type: object
      properties:
        id:
          type: string
        sourceID:
          type: string
        status:
          type: string
          enum:
            - success
            - failed
        itemsFetched:
          type: integer
        error:
          type: string
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
    CollectionRunListResponse:
      type: object
      properties:
        collectionRuns:
          type: array
          items:
            $ref: "#/components/schemas/CollectionRun"
    CollectionRunResponse:
      type: object
      properties:
        collectionRun:
          $ref: "#/components/schemas/CollectionRun"
    AuditLog:
      type: object
      required:
        - id
        - actorId
        - action
        - resourceType
        - result
        - createdAt
      properties:
        id:
          type: string
        actorId:
          type: string
        action:
          type: string
          enum:
            - create
            - update
            - delete
        resourceType:
          type: string
        resourceId:
          type: string
        result:
          type: string
          enum:
            - success
            - failure
        createdAt:
          type: string
          format: date-time
    AuditLogListResponse:
      type: object
      properties:
        auditLogs:
          type: array
          items:
            $ref: "#/components/schemas/AuditLog"
    ComponentStatus:
      type: object
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
        reason:
          type: string
          description: Uses missing_config when DashScope or SMTP configuration is absent.
    ConfigStatus:
      type: object
      properties:
        overall:
          type: string
          enum:
            - ok
            - degraded
        components:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ComponentStatus"
    ConfigStatusResponse:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/ConfigStatus"
    QueueOverview:
      type: object
      properties:
        total:
          type: integer
        pending:
          type: integer
        running:
          type: integer
        scheduled:
          type: integer
        succeeded:
          type: integer
        failed:
          type: integer
        deadLetter:
          type: integer
    QueueOverviewResponse:
      type: object
      properties:
        queue:
          $ref: "#/components/schemas/QueueOverview"
    Job:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        payload:
          type: object
        status:
          type: string
          enum:
            - pending
            - running
            - scheduled
            - succeeded
            - failed
            - dead_letter
        attempt:
          type: integer
        maxAttempts:
          type: integer
        idempotencyKey:
          type: string
        lastError:
          type: string
        nextRunAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    JobResponse:
      type: object
      properties:
        job:
          $ref: "#/components/schemas/Job"
    JobListResponse:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
    DailyReportRerunRequest:
      type: object
      required:
        - date
      properties:
        date:
          type: string
          format: date
        channelId:
          type: string
        userId:
          type: string
    SourceRef:
      type: object
      properties:
        sourceId:
          type: string
        itemId:
          type: string
        title:
          type: string
        url:
          type: string
          format: uri
    DailyReport:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
          format: date
        channelId:
          type: string
        userId:
          type: string
        promptVersion:
          type: string
        inputHotspotIds:
          type: array
          items:
            type: string
        body:
          type: string
        status:
          type: string
          enum:
            - succeeded
            - degraded
            - failed_config
            - failed
        lastError:
          type: string
        sourceRefs:
          type: array
          items:
            $ref: "#/components/schemas/SourceRef"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DailyReportList:
      type: object
      properties:
        reports:
          type: array
          items:
            $ref: "#/components/schemas/DailyReport"
    RSSFeed:
      type: object
      properties:
        userId:
          type: string
        enabled:
          type: boolean
        lastAccessedAt:
          type:
            - string
            - "null"
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RSSFeedWithToken:
      allOf:
        - $ref: "#/components/schemas/RSSFeed"
        - type: object
          properties:
            token:
              type: string
    ObsidianConnectRequest:
      type: object
      required:
        - repoUrl
        - accessToken
      properties:
        repoUrl:
          type: string
        branch:
          type: string
        baseDir:
          type: string
        accessToken:
          type: string
        eventNoteTemplate:
          type: string
        dailyReportIndex:
          type: string
        weeklyReportIndex:
          type: string
        conflictResolution:
          type: string
          enum: [skip, branch]
    ObsidianConnectResponse:
      type: object
      properties:
        configId:
          type: string
        status:
          type: string
        defaultBranch:
          type: string
        branches:
          type: array
          items:
            type: string
    ObsidianStatusResponse:
      type: object
      properties:
        configId:
          type: string
        repoUrl:
          type: string
        branch:
          type: string
        baseDir:
          type: string
        status:
          type: string
        lastError:
          type: string
        lastSync:
          type: string
          format: date-time
          nullable: true
    ObsidianSyncRequest:
      type: object
      required:
        - contentType
        - contentId
        - title
      properties:
        contentType:
          type: string
        contentId:
          type: string
        title:
          type: string
        body:
          type: string
        tags:
          type: array
          items:
            type: string
        frontmatter:
          type: object
          additionalProperties:
            type: string
    ObsidianSyncResponse:
      type: object
      properties:
        recordId:
          type: string
        filePath:
          type: string
        commitSha:
          type: string
        commitUrl:
          type: string
        state:
          type: string
        wasIdempotent:
          type: boolean
    AdapterInfo:
      type: object
      required:
        - name
        - provider
        - health_status
        - supports_incremental
        - max_items_per_fetch
        - rate_limit_per_hour
      properties:
        name:
          type: string
        provider:
          type: string
          enum:
            - rss
            - public_page
            - official_api
        health_status:
          type: string
          enum:
            - healthy
            - degraded
            - unhealthy
        health_last_error:
          type: string
        health_last_checked_at:
          type: string
          format: date-time
        supports_incremental:
          type: boolean
        max_items_per_fetch:
          type: integer
        rate_limit_per_hour:
          type: integer
    AdapterHealth:
      type: object
      required:
        - status
        - last_checked_at
      properties:
        status:
          type: string
          enum:
            - healthy
            - degraded
            - unhealthy
        last_error:
          type: string
        last_checked_at:
          type: string
          format: date-time
    AdapterCapabilities:
      type: object
      required:
        - supports_incremental
        - max_items_per_fetch
        - rate_limit_per_hour
      properties:
        supports_incremental:
          type: boolean
        max_items_per_fetch:
          type: integer
        rate_limit_per_hour:
          type: integer
