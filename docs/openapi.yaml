openapi: 3.1.0
info:
  title: HotKey Server API
  version: 0.2.0
paths:
  /healthz:
    get:
      responses:
        "200":
          description: Health check.
  /api/v1/auth/register:
    post:
      summary: Register with email and password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "201":
          description: User created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "409":
          description: Duplicate email.
          content:
            application/json:
              examples:
                duplicate:
                  value:
                    error:
                      code: email_already_exists
                      message: email already exists
  /api/v1/auth/login:
    post:
      summary: Login with email and password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: Access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          description: Uniform credential failure.
          content:
            application/json:
              examples:
                invalid:
                  value:
                    error:
                      code: invalid_credentials
                      message: invalid credentials
  /api/v1/auth/refresh:
    post:
      summary: Exchange refresh token for a new access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          description: Refresh token is invalid, revoked, or expired.
  /api/v1/auth/logout:
    post:
      summary: Revoke a refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: Refresh token revoked.
  /api/v1/me:
    get:
      summary: Current user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Missing or invalid access token.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    AuthRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    Session:
      type: object
      required:
        - accessToken
        - refreshToken
        - expiresAt
        - user
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"
    UserResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      required:
        - id
        - email
        - role
        - status
        - timezone
        - dailySendAt
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - user
            - admin
        status:
          type: string
          enum:
            - active
            - disabled
        timezone:
          type: string
        dailySendAt:
          type: string
